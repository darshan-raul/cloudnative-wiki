# Scenario 03 — Path-based routing
# Same hostname, different paths, different backends. The first matching rule wins
# (rules are evaluated top to bottom).
#
# Verify:
#   curl -H "Host: paths.example.com" http://127.0.0.1/api/v1/headers
#   curl -H "Host: paths.example.com" http://127.0.0.1/api/v2/headers
#   curl -H "Host: paths.example.com" http://127.0.0.1/status/200
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-v1
  namespace: app
  labels: { app: api-v1 }
spec:
  replicas: 1
  selector: { matchLabels: { app: api-v1 } }
  template:
    metadata: { labels: { app: api-v1 } }
    spec:
      containers:
      - name: api-v1
        image: mendhak/http-https-echo:32
        env:
        - name: HTTP_ECHO_BACKEND_TEXT
          value: "v1 response"
        ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata:
  name: api-v1
  namespace: app
spec:
  selector: { app: api-v1 }
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-v2
  namespace: app
  labels: { app: api-v2 }
spec:
  replicas: 1
  selector: { matchLabels: { app: api-v2 } }
  template:
    metadata: { labels: { app: api-v2 } }
    spec:
      containers:
      - name: api-v2
        image: mendhak/http-https-echo:32
        env:
        - name: HTTP_ECHO_BACKEND_TEXT
          value: "v2 response"
        ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata:
  name: api-v2
  namespace: app
spec:
  selector: { app: api-v2 }
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: paths
  namespace: app
spec:
  parentRefs:
  - name: eg
    namespace: infra
  hostnames: ["paths.example.com"]
  rules:
  - matches:
    - path: { type: PathPrefix, value: /api/v1 }
    backendRefs:
    - name: api-v1
      port: 80
  - matches:
    - path: { type: PathPrefix, value: /api/v2 }
    backendRefs:
    - name: api-v2
      port: 80
  - matches:
    - path: { type: PathPrefix, value: /status }
    backendRefs:
    - name: api-v1
      port: 80
