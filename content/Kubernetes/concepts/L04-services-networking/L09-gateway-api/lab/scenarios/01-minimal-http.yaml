# Scenario 01 — Minimal HTTP
# The smallest useful Gateway API setup:
#   - a Service + Deployment for an "echo" app
#   - an HTTPRoute that binds to the baseline Gateway on a specific hostname
#
# Verify:
#   curl -H "Host: minimal.example.com" http://127.0.0.1/ -i
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: app
  labels: { app: echo }
spec:
  replicas: 1
  selector:
    matchLabels: { app: echo }
  template:
    metadata:
      labels: { app: echo }
    spec:
      containers:
      - name: echo
        image: mendhak/http-https-echo:32
        ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: app
spec:
  selector: { app: echo }
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minimal
  namespace: app
spec:
  parentRefs:
  - name: eg
    namespace: infra
  hostnames: ["minimal.example.com"]
  rules:
  - matches:
    - path: { type: PathPrefix, value: / }
    backendRefs:
    - name: echo
      port: 80
