# Scenario 10 — Re-encrypt + BackendTLSPolicy (mTLS to upstream)
# Two layers of TLS:
#   1. Client -> Gateway: terminated at the gateway (mode: Terminate)
#   2. Gateway -> Upstream: re-encrypted, and the upstream's cert is verified
#      against a CA we ship in a ConfigMap.
#
# Use case: zero-trust inside the cluster. Common for PCI/HIPAA.
#
# Verify:
#   curl -k --resolve reencrypt.example.com:443:127.0.0.1 \
#     https://reencrypt.example.com/ -i
#   # 200 from the upstream (proves both TLS legs worked)
#
#   # Check the gateway rejects traffic if BackendTLSPolicy is set but the
#   # backend cert has a wrong SAN. Try by editing the backend cert.
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned
  namespace: infra
spec:
  selfSigned: {}
---
# Edge cert (client-facing)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: reencrypt-edge-cert
  namespace: infra
spec:
  secretName: reencrypt-edge-tls
  dnsNames: [reencrypt.example.com]
  issuerRef: { name: selfsigned, kind: Issuer }
---
# Upstream cert + private key (for the backend)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: reencrypt-backend-cert
  namespace: app
spec:
  secretName: reencrypt-backend-tls
  dnsNames:
  - reencrypt-internal.app.svc.cluster.local
  - reencrypt.example.com
  issuerRef: { name: selfsigned, kind: Issuer }
---
# CA cert for the backend, in a ConfigMap so BackendTLSPolicy can use it
apiVersion: v1
kind: ConfigMap
metadata:
  name: reencrypt-ca
  namespace: app
data:
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    # Replace with the actual CA cert that signed reencrypt-backend-cert.
    # Easiest: kubectl get cm reencrypt-ca -n app -o jsonpath='{.data.ca\.crt}'
    # In a real lab, export from the cert-manager Issuer and re-inject.
    # For testing, you can also use wellKnownCACertificates: SystemTrustStore
    # and ensure the upstream's CA is in the gateway's trust bundle.
    -----END CERTIFICATE-----
---
# Backend deployment: HTTPS server on 8443
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reencrypt-target
  namespace: app
  labels: { app: reencrypt-target }
spec:
  replicas: 1
  selector: { matchLabels: { app: reencrypt-target } }
  template:
    metadata: { labels: { app: reencrypt-target } }
    spec:
      containers:
      - name: reencrypt-target
        image: nginx:1.27-alpine
        ports: [{ containerPort: 8443 }]
        volumeMounts:
        - { name: tls,  mountPath: /etc/nginx/ssl, readOnly: true }
        - { name: conf, mountPath: /etc/nginx/conf.d, readOnly: true }
      volumes:
      - name: tls
        secret: { secretName: reencrypt-backend-tls }
      - name: conf
        configMap: { name: reencrypt-nginx-conf }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: reencrypt-nginx-conf
  namespace: app
data:
  default.conf: |
    server {
      listen 8443 ssl;
      server_name reencrypt-internal.app.svc.cluster.local;
      ssl_certificate     /etc/nginx/ssl/tls.crt;
      ssl_certificate_key /etc/nginx/ssl/tls.key;
      location / { return 200 "reencrypt backend: ok\n"; add_header Content-Type text/plain; }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: reencrypt-target
  namespace: app
spec:
  selector: { app: reencrypt-target }
  ports:
  - port: 443
    targetPort: 8443
---
# Upstream mTLS: gateway verifies backend cert
apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: reencrypt-upstream-mtls
  namespace: app
spec:
  targetRefs:
  - group: ""
    kind: Service
    name: reencrypt-target
  tls:
    caCertificateRefs:
    - group: ""
      kind: ConfigMap
      name: reencrypt-ca
    hostname: reencrypt-internal.app.svc.cluster.local
    mode: Require
---
# Gateway: terminate client TLS, re-encrypt to upstream
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eg-tls-reencrypt
  namespace: infra
  labels:
    app.kubernetes.io/name: eg-tls-reencrypt
spec:
  gatewayClassName: eg
  listeners:
  - name: https
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: reencrypt-edge-tls
    allowedRoutes:
      namespaces: { from: All }
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: reencrypt
  namespace: app
spec:
  parentRefs:
  - name: eg-tls-reencrypt
    namespace: infra
  hostnames: ["reencrypt.example.com"]
  rules:
  - matches:
    - path: { type: PathPrefix, value: / }
    backendRefs:
    - name: reencrypt-target
      port: 443
---
apiVersion: v1
kind: Service
metadata:
  name: eg-tls-reencrypt-nodeport
  namespace: infra
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: eg-tls-reencrypt
    gateway.envoyproxy.io/owning-gateway-name: eg-tls-reencrypt
  ports:
  - name: https
    port: 443
    targetPort: 8443
    nodePort: 30001
