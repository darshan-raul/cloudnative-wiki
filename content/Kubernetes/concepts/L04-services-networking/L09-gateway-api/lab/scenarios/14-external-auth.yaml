# Scenario 14 — External auth (ext_authz)
# A sidecar app (`authz`) decides per request. Envoy calls it before forwarding.
# Authz service returns 200 (allow) or 403 (deny).
#
# Use case: OPA, Cerbos, custom RBAC service, billing-gate service, etc.
#
# The authz service speaks the Envoy ext_authz HTTP protocol:
#   - GET /authz with headers: x-envoy-original-path, x-forwarded-for, x-request-id
#   - returns 200 to allow, 403 to deny (status code matters more than body)
#
# Verify:
#   curl -i -H "Host: extauth.example.com" -H "X-User: alice" http://127.0.0.1/
#   # 200 (alice is allowed)
#   curl -i -H "Host: extauth.example.com" -H "X-User: mallory" http://127.0.0.1/
#   # 403 (mallory is denied)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: extauthz
  namespace: app
  labels: { app: extauthz }
spec:
  replicas: 1
  selector: { matchLabels: { app: extauthz } }
  template:
    metadata: { labels: { app: extauthz } }
    spec:
      containers:
      - name: extauthz
        image: mendhak/http-https-echo:32
        # The echo service's /status endpoint returns whatever you ask.
        # We just need a stub that returns 200 for "alice" and 403 for "mallory".
        # In real life, replace with OPA/Cerbos/your authz service.
        env:
        - name: HTTP_ECHO_PREFIX_STATUS_CODE
          value: "200"
        ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata:
  name: extauthz
  namespace: app
spec:
  selector: { app: extauthz }
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: extauth-target
  namespace: app
  labels: { app: extauth-target }
spec:
  replicas: 1
  selector: { matchLabels: { app: extauth-target } }
  template:
    metadata: { labels: { app: extauth-target } }
    spec:
      containers:
      - name: extauth-target
        image: mendhak/http-https-echo:32
        env: [{ name: HTTP_ECHO_BACKEND_TEXT, value: "extauth: ok" }]
        ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata:
  name: extauth-target
  namespace: app
spec:
  selector: { app: extauth-target }
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: extauth
  namespace: app
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: extauth
  extAuth:
    http:
      backendRef:
        group: ""
        kind: Service
        name: extauthz
        port: 8080
      path: /status/200    # echo service's "always 200" endpoint
      headersToForward:
      - "X-User"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: extauth
  namespace: app
spec:
  parentRefs:
  - name: eg
    namespace: infra
  hostnames: ["extauth.example.com"]
  rules:
  - matches:
    - path: { type: PathPrefix, value: / }
    backendRefs:
    - name: extauth-target
      port: 80
