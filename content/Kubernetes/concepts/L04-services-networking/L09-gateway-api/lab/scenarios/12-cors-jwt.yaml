# Scenario 12 — CORS + JWT (EG SecurityPolicy extension)
# Cross-Origin Resource Sharing: browser-friendly, defines which origins,
# methods, and headers are allowed.
# JWT validation: every request must have a valid Bearer token.
#
# This uses EG's `SecurityPolicy` (vendor extension). For spec-portable
# auth, you'd put it in the app or use a service mesh.
#
# We sign our test tokens with a public/private key pair. For a real lab,
# point `jwksUri` at your IdP (Keycloak, Auth0, Cognito, etc.).
#
# Verify:
#   # CORS preflight
#   curl -i -X OPTIONS \
#     -H "Host: secure.example.com" \
#     -H "Origin: https://app.example.com" \
#     -H "Access-Control-Request-Method: POST" \
#     -H "Access-Control-Request-Headers: authorization,content-type" \
#     http://127.0.0.1/
#   # expect 200 with Access-Control-Allow-* headers
#
#   # Without JWT -> 401
#   curl -i -H "Host: secure.example.com" http://127.0.0.1/
#
#   # With JWT -> 200
#   TOKEN="<signed-jwt-with-iss=https://issuer.example.com, aud=secure.example.com, exp=future>"
#   curl -i -H "Host: secure.example.com" -H "Authorization: Bearer $TOKEN" http://127.0.0.1/
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-target
  namespace: app
  labels: { app: secure-target }
spec:
  replicas: 1
  selector: { matchLabels: { app: secure-target } }
  template:
    metadata: { labels: { app: secure-target } }
    spec:
      containers:
      - name: secure-target
        image: mendhak/http-https-echo:32
        env: [{ name: HTTP_ECHO_BACKEND_TEXT, value: "secure: ok" }]
        ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata:
  name: secure-target
  namespace: app
spec:
  selector: { app: secure-target }
  ports:
  - port: 80
    targetPort: 8080
---
# The EG SecurityPolicy. Targets the HTTPRoute by name. CORS + JWT.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: secure
  namespace: app
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: secure
  cors:
    allowOrigins:
    - "https://app.example.com"
    allowMethods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
    allowHeaders:
    - "Authorization"
    - "Content-Type"
    exposeHeaders:
    - "X-Request-Id"
    maxAge: 600s
  jwt:
    providers:
    - name: my-idp
      remoteJWKS:
        uri: https://idp.example.com/.well-known/jwks.json
        # For self-signed test keys, use inline JWKS via `localJWKS` instead.
      claimToHeaders:
      - claim: sub
        header: X-User-Id
      - claim: scope
        header: X-User-Scopes
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: secure
  namespace: app
spec:
  parentRefs:
  - name: eg
    namespace: infra
  hostnames: ["secure.example.com"]
  rules:
  - matches:
    - path: { type: PathPrefix, value: / }
    backendRefs:
    - name: secure-target
      port: 80
