# Scenario 04 — Header-based routing
# Route on request headers (X-Version: v2) to direct a subset of traffic
# to a specific backend. Useful for canary-by-header or A/B testing.
#
# Verify:
#   curl -H "Host: header.example.com" -H "X-Version: v2" http://127.0.0.1/ -i
#   curl -H "Host: header.example.com" http://127.0.0.1/ -i
#   (v2 backend responds for the first, v1 for the second)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: header-v1
  namespace: app
  labels: { app: header-v1 }
spec:
  replicas: 1
  selector: { matchLabels: { app: header-v1 } }
  template:
    metadata: { labels: { app: header-v1 } }
    spec:
      containers:
      - name: header-v1
        image: mendhak/http-https-echo:32
        env: [{ name: HTTP_ECHO_BACKEND_TEXT, value: "v1" }]
        ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata:
  name: header-v1
  namespace: app
spec:
  selector: { app: header-v1 }
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: header-v2
  namespace: app
  labels: { app: header-v2 }
spec:
  replicas: 1
  selector: { matchLabels: { app: header-v2 } }
  template:
    metadata: { labels: { app: header-v2 } }
    spec:
      containers:
      - name: header-v2
        image: mendhak/http-https-echo:32
        env: [{ name: HTTP_ECHO_BACKEND_TEXT, value: "v2" }]
        ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata:
  name: header-v2
  namespace: app
spec:
  selector: { app: header-v2 }
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: header-route
  namespace: app
spec:
  parentRefs:
  - name: eg
    namespace: infra
  hostnames: ["header.example.com"]
  rules:
  # Header match — exact value match
  - matches:
    - headers:
      - type: Exact
        name: X-Version
        value: v2
      path: { type: PathPrefix, value: / }
    backendRefs:
    - name: header-v2
      port: 80
  # Fallthrough — no header match
  - matches:
    - path: { type: PathPrefix, value: / }
    backendRefs:
    - name: header-v1
      port: 80
